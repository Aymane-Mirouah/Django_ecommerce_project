{% extends 'store/main.html' %} {% block content %}
<div class="animate-fade-in max-w-md mx-auto w-full">
    <div
        class="bg-white/40 backdrop-blur-xl border border-white/50 rounded-[2rem] p-8 sm:p-10 shadow-2xl"
    >
        <div class="text-center mb-8">
            <span
                class="material-symbols-outlined text-4xl text-primary/80 mb-2"
                >lock_person</span
            >
            <h1 class="text-3xl font-serif italic font-semibold text-secondary">
                Sign In
            </h1>
            <p class="text-sm text-secondary/60 mt-2">
                Welcome back to Old Kech.
            </p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-secondary/80 mb-2"
                    >Email</label
                >
                <input
                    type="email"
                    name="email"
                    required
                    class="w-full bg-white/50 border border-white/60 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl px-4 py-3 text-secondary outline-none transition-all shadow-sm"
                />
            </div>
            <div>
                <label class="block text-sm font-medium text-secondary/80 mb-2"
                    >Password</label
                >
                <input
                    type="password"
                    name="password"
                    required
                    class="w-full bg-white/50 border border-white/60 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl px-4 py-3 text-secondary outline-none transition-all shadow-sm"
                />
            </div>

            <button
                type="submit"
                class="w-full bg-primary/90 hover:bg-primary text-white py-3.5 rounded-xl font-medium transition-all shadow-md hover:shadow-lg mt-4"
            >
                Sign In
            </button>
        </form>

        <div class="text-center mt-8 pt-6 border-t border-white/40">
            <p class="text-sm text-secondary/70">
                Don't have an account?
                <a
                    href="{% url 'register' %}"
                    class="font-semibold text-primary hover:text-primaryHover transition-colors"
                    >Create one</a
                >
            </p>
        </div>
    </div>
</div>
{% endblock content %}
